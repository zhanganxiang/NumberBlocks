name: Build APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          lld \
          cython
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython buildozer
    
    - name: Build APK
      run: buildozer android debug
      timeout-minutes: 30
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: numberblocks-apk
        path: bin/*.apk
        if-no-files-found: warn
