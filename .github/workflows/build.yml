name: Build APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: sudo apt-get update && sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev lld
      - run: pip install buildozer
      - run: buildozer android debug
        timeout-minutes: 30
      - uses: actions/upload-artifact@v4
        with:
          name: numberblocks-apk
          path: bin/*.apk
